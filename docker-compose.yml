services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: products_db
    volumes:
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d products_db && psql -U postgres -d products_db -tAc \"SELECT count(*) FROM products\" | grep -q 100000"]
      interval: 5s
      timeout: 5s
      retries: 60
    networks:
      - benchmark-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - benchmark-net

  memcached:
    image: memcached:1.6-alpine
    ports:
      - "11211:11211"
    healthcheck:
      test: ["CMD-SHELL", "echo stats | nc -w 2 127.0.0.1 11211 | grep -q STAT"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - benchmark-net

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      REDIS_URL: redis://redis:6379
      MEMCACHED_URL: memcached:11211
      DATABASE_URL: postgres://postgres:postgres@db:5432/products_db
      API_PORT: 3000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      memcached:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', r => process.exit(r.statusCode===200?0:1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - benchmark-net

networks:
  benchmark-net:
    name: benchmark-net

volumes:
  pgdata:
